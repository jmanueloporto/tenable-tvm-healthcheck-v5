<!DOCTYPE html>
<html>
<head>
    <title>Dashboard v5.3.1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Tenable TVM Health Check v5.3.1</span>
    <button id="btnRunAudit" class="btn btn-success">Run New Audit</button>
</nav>
<div class="container mt-4">
    <div class="row text-center mb-4">
        <div class="col-md-6"><div class="card p-3"><h5>Global Score</h5><h2 class="text-primary">{{ data.global_score }}/5.0</h2></div></div>
        <div class="col-md-6"><div class="card p-3"><h5>Execution Time</h5><h2 class="text-success">{{ data.execution_time }}s</h2></div></div>
    </div>
    <div class="card p-4"><canvas id="radarChart" style="max-height: 400px;"></canvas></div>
</div>
<script>
    document.getElementById('btnRunAudit').onclick = function() {
        this.disabled = true; 
        this.innerHTML = 'Running Audit...';
        this.className = 'btn btn-warning';
        
        fetch('/api/run-audit', {method: 'POST'})
        .then(res => res.json())
        .then(data => { 
            if(data.status==='success') window.location.reload(); 
            else alert('Error en auditoria'); 
        })
        .catch(err => alert('Fallo de conexion'));
    };
    
    const scores = {{ data.domain_scores | tojson if data.domain_scores else '{}' }};
    new Chart(document.getElementById('radarChart'), {
        type: 'radar',
        data: {
            labels: ['Assets', 'Scans', 'Risk', 'SLA', 'Identity', 'Ecosystem'],
            datasets: [{ 
                label: 'Maturity Level', 
                data: [scores['1'], scores['2'], scores['3'], scores['4'], scores['5'], scores['6']], 
                backgroundColor: 'rgba(54, 162, 235, 0.2)',
                borderColor: 'rgb(54, 162, 235)'
            }]
        },
        options: { scales: { r: { suggestMin: 0, suggestMax: 5 } } }
    });
</script>
</body>
</html>
